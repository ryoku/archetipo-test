services:
  postgres:
    image: postgres:16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: kubegate
      POSTGRES_USER: kubegate
      POSTGRES_PASSWORD: kubegate
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kubegate -d kubegate"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    command: ["start-dev", "--import-realm"]
    ports:
      - "8080:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ./keycloak/kubegate-realm.json:/opt/keycloak/data/import/kubegate-realm.json:ro
    # Keycloak uses embedded H2 in dev mode — no DB dependency.
    # Startup is ordered after postgres to ensure the full stack is ready
    # before `make dev` proceeds, but there is no hard runtime dependency.
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8080"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s

volumes:
  postgres_data:
