<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KubeGate — Errore API (slug duplicato) · US-044</title>
<link rel="stylesheet" href="shared.css">
<style>
.p-icon-a { background: linear-gradient(135deg, #00c3aa, #0077cc); }
.p-icon-b { background: linear-gradient(135deg, #7b6cf0, #c060f0); }
.p-icon-c { background: linear-gradient(135deg, #f09030, #e04060); }
.p-icon-d { background: linear-gradient(135deg, #40c060, #0080a0); }
</style>
</head>
<body>

<div class="home-page">

  <!-- ─── HEADER ─────────────────────────────────────────────────── -->
  <header class="home-header">
    <div class="home-header-brand">
      <div class="home-logo-mark">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M8 1L13 4V8C13 11 10.5 13.5 8 15C5.5 13.5 3 11 3 8V4L8 1Z"
                stroke="white" stroke-width="1.5" stroke-linejoin="round"/>
          <path d="M6 8L7.5 9.5L10 7" stroke="white" stroke-width="1.5"
                stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="home-logo-name">KubeGate</span>
    </div>
    <div class="home-header-user">
      <div class="home-avatar">SB</div>
      <span class="home-user-name">Sara Bianchi</span>
      <span class="home-user-role">DevOps Admin</span>
      <button class="home-btn-logout">Logout</button>
    </div>
  </header>

  <!-- ─── MAIN ────────────────────────────────────────────────────── -->
  <main class="home-main">

    <div class="home-page-top">
      <div class="home-page-head">
        <h1 class="home-page-title">Products</h1>
        <p class="home-page-desc">Seleziona un prodotto per visualizzare e gestire i suoi componenti.</p>
      </div>
      <!-- "Add Product" hidden: form is open -->
    </div>

    <!-- ─── API ERROR BANNER (slug già esistente) ─────────────────── -->
    <div class="pd-api-error" id="apiError" role="alert">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" style="flex-shrink:0;margin-top:1px">
        <circle cx="7" cy="7" r="6"/>
        <path d="M7 4.5v3M7 9.5v.5"/>
      </svg>
      <span>
        Slug già in uso: <strong style="font-family:var(--font-mono);font-size:12px;">platform-api</strong> esiste già.
        Scegli uno slug diverso.
      </span>
    </div>

    <!-- ─── INLINE FORM — form stays open with values intact ──────── -->
    <div class="pd-inline-form" id="inlineForm">
      <div class="pd-inline-form-title">
        <svg width="13" height="13" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M6 2v8M2 6h8"/>
        </svg>
        Nuovo prodotto
      </div>

      <div class="pd-form-row">
        <!-- Name — OK -->
        <div class="pd-field">
          <label class="pd-field-label" for="prodName">Name *</label>
          <input class="pd-input" id="prodName" type="text"
                 value="Platform API"
                 autocomplete="off">
          <span class="pd-field-hint">nome visualizzato</span>
        </div>

        <!-- Slug — API error highlighted -->
        <div class="pd-field">
          <label class="pd-field-label" for="prodSlug">Slug *</label>
          <input class="pd-input pd-input-mono error" id="prodSlug" type="text"
                 value="platform-api"
                 autocomplete="off">
          <span class="pd-field-error">Slug già in uso — scegli un identificatore diverso</span>
        </div>

        <!-- Description — OK -->
        <div class="pd-field">
          <label class="pd-field-label" for="prodDesc">Description</label>
          <input class="pd-input" id="prodDesc" type="text"
                 value="Secondo layer API per partner esterni."
                 autocomplete="off">
          <span class="pd-field-hint">opzionale</span>
        </div>
      </div>

      <div class="pd-form-actions">
        <button class="btn btn-ghost btn-sm" onclick="dismissAndClose()">Annulla</button>
        <button class="btn btn-primary btn-sm" onclick="retrySave()">
          <svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1.5 5.5l3 3L9.5 2.5"/>
          </svg>
          Salva prodotto
        </button>
      </div>
    </div>

    <!-- ─── PRODUCT GRID ──────────────────────────────────────────── -->
    <div class="home-product-grid">
      <button class="home-product-card">
        <div class="home-p-card-top">
          <div class="home-p-icon p-icon-a">PL</div>
          <div class="home-p-info">
            <div class="home-p-name">Platform API</div>
            <div class="home-p-slug">platform-api</div>
          </div>
        </div>
        <p class="home-p-desc">Core API layer per la piattaforma.</p>
      </button>
      <button class="home-product-card">
        <div class="home-p-card-top">
          <div class="home-p-icon p-icon-b">CA</div>
          <div class="home-p-info">
            <div class="home-p-name">Customer App</div>
            <div class="home-p-slug">customer-app</div>
          </div>
        </div>
        <p class="home-p-desc">Applicazione per gli utenti finali.</p>
      </button>
      <button class="home-product-card">
        <div class="home-p-card-top">
          <div class="home-p-icon p-icon-c">DS</div>
          <div class="home-p-info">
            <div class="home-p-name">Data Sync</div>
            <div class="home-p-slug">data-sync</div>
          </div>
        </div>
        <p class="home-p-desc">Sincronizzazione dati tra sistemi interni.</p>
      </button>
      <button class="home-product-card">
        <div class="home-p-card-top">
          <div class="home-p-icon p-icon-d">NX</div>
          <div class="home-p-info">
            <div class="home-p-name">Nexus Gateway</div>
            <div class="home-p-slug">nexus-gateway</div>
          </div>
        </div>
        <p class="home-p-desc">Gateway per l'ingress del traffico.</p>
      </button>
    </div>

  </main>
</div>

<!-- ─── TOAST STACK ───────────────────────────────────────────────── -->
<div class="toast-stack" id="toastStack"></div>

<script>
function dismissAndClose() {
  window.location.reload();
}

// Simulate: user fixes the slug and retries
function retrySave() {
  const slug = document.getElementById('prodSlug').value.trim();
  document.getElementById('apiError').classList.add('hidden');

  const slugError = document.querySelector('.pd-field-error');
  if (slugError) {
    slugError.className = 'pd-field-hint';
    slugError.textContent = 'lowercase, lettere, cifre e trattini';
  }
  document.getElementById('prodSlug').classList.remove('error');

  const btn = document.querySelector('.btn-primary');
  btn.disabled = true;
  btn.textContent = 'Salvataggio…';

  setTimeout(() => {
    btn.disabled = false;
    btn.innerHTML = `
      <svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M1.5 5.5l3 3L9.5 2.5"/>
      </svg>
      Salva prodotto`;
    showToast(`Prodotto creato — modifica lo slug per testare un successo`, 'ok');
  }, 800);
}

function showToast(html, type) {
  const stack = document.getElementById('toastStack');
  const t = document.createElement('div');
  t.className = 'toast toast-' + type;
  const dot = type === 'ok'
    ? `<div style="width:6px;height:6px;border-radius:50%;background:var(--ok);flex-shrink:0;"></div>`
    : `<div style="width:6px;height:6px;border-radius:50%;background:var(--danger);flex-shrink:0;"></div>`;
  t.innerHTML = `${dot}<div class="toast-msg">${html}</div>`;
  stack.appendChild(t);
  setTimeout(() => {
    t.style.transition = 'opacity .3s'; t.style.opacity = '0';
    setTimeout(() => t.remove(), 350);
  }, 4000);
}
</script>
</body>
</html>
