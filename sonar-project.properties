sonar.projectKey=archetipo-test
sonar.projectName=KubeGate

# ---------------------------------------------------------------------------
# Sources — project-relative paths for all languages
# ---------------------------------------------------------------------------
# Go: internal/ and cmd/
# TypeScript: web/src/ (test files co-located with sources)
sonar.sources=internal,cmd,web/src

# ---------------------------------------------------------------------------
# Test files
# ---------------------------------------------------------------------------
# Go test files are auto-detected by the *_test.go suffix.
# TypeScript test and spec files are declared explicitly.
sonar.tests=web/src
sonar.test.inclusions=\
  web/src/**/*.test.ts,\
  web/src/**/*.test.tsx,\
  web/src/**/*.spec.ts,\
  web/src/**/*.spec.tsx

# ---------------------------------------------------------------------------
# Coverage exclusions — keep test code out of coverage computation
# ---------------------------------------------------------------------------
sonar.coverage.exclusions=\
  **/*_test.go,\
  web/src/**/*.test.ts,\
  web/src/**/*.test.tsx,\
  web/src/**/*.spec.ts,\
  web/src/**/*.spec.tsx

# ---------------------------------------------------------------------------
# Coverage reports
# ---------------------------------------------------------------------------
# go test -race -coverprofile=coverage.out writes to the repo root
sonar.go.coverage.reportPaths=coverage.out
# pnpm test:coverage writes web/coverage/lcov.info
sonar.javascript.lcov.reportPaths=web/coverage/lcov.info

# ---------------------------------------------------------------------------
# Host and auth
# ---------------------------------------------------------------------------
# Override locally to point at your SonarQube instance
sonar.host.url=http://localhost:9000

# Authentication: export SONAR_TOKEN=<your-personal-token> before running sonar-scanner
# Never set sonar.token here — keep credentials out of version control
