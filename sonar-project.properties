sonar.projectKey=archetipo-test
sonar.projectName=KubeGate

# Multi-language monorepo: separate modules so each language resolves paths from its own base dir
sonar.modules=internal,frontend

# Go module — paths relative to repo root
internal.sonar.projectName=KubeGate (Go)
internal.sonar.projectBaseDir=.
internal.sonar.sources=internal,cmd
internal.sonar.go.coverage.reportPaths=coverage.out
internal.sonar.coverage.exclusions=**/*_test.go

# TypeScript frontend module — paths relative to web/
frontend.sonar.projectName=KubeGate (Frontend)
frontend.sonar.projectBaseDir=web
frontend.sonar.sources=src
frontend.sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Override this locally to point at your SonarQube instance
sonar.host.url=http://localhost:9000

# Authentication: export SONAR_TOKEN=<your-personal-token> before running sonar-scanner
# Never set sonar.token here — keep credentials out of version control
