sonar.projectKey=archetipo-test
sonar.projectName=KubeGate

# ---------------------------------------------------------------------------
# Sources — project-relative paths for all languages
# ---------------------------------------------------------------------------
# Go: internal/ and cmd/
# TypeScript: web/src/ (test files co-located with sources)
sonar.sources=internal,cmd,web/src

# ---------------------------------------------------------------------------
# Test files
# ---------------------------------------------------------------------------
# Go test files are auto-detected by the *_test.go suffix.
# TypeScript test and spec files are declared explicitly.
sonar.tests=web/src
sonar.test.inclusions=\
  web/src/**/*.test.ts,\
  web/src/**/*.test.tsx,\
  web/src/**/*.spec.ts,\
  web/src/**/*.spec.tsx

# ---------------------------------------------------------------------------
# Coverage exclusions — keep test code out of coverage computation
# ---------------------------------------------------------------------------
sonar.coverage.exclusions=\
  **/*_test.go,\
  cmd/**,\
  internal/store/**,\
  web/src/**/*.test.ts,\
  web/src/**/*.test.tsx,\
  web/src/**/*.spec.ts,\
  web/src/**/*.spec.tsx

# ---------------------------------------------------------------------------
# Coverage reports
# ---------------------------------------------------------------------------
# go test -race -coverprofile=coverage.out writes to the repo root
sonar.go.coverage.reportPaths=coverage.out
# pnpm test:coverage writes web/coverage/lcov.info
sonar.javascript.lcov.reportPaths=web/coverage/lcov.info

# ---------------------------------------------------------------------------
# Rule exclusions
# ---------------------------------------------------------------------------
# go:S1192 (string duplication) — test files use inline fixture strings by
# convention (table-driven tests); extracting them would hurt readability.
sonar.issue.ignore.multicriteria=e1,e2

# e1: string duplication rule suppressed for Go test files
sonar.issue.ignore.multicriteria.e1.ruleKey=go:S1192
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*_test.go

# e2: function naming rule (^(_|[a-zA-Z0-9]+)$) suppressed for Go test files.
# Go's canonical test convention is TestFunctionName_Scenario with underscores;
# renaming would contradict the Go standard library and break go test -run filters.
sonar.issue.ignore.multicriteria.e2.ruleKey=go:S100
sonar.issue.ignore.multicriteria.e2.resourceKey=**/*_test.go

# ---------------------------------------------------------------------------
# Host and auth
# ---------------------------------------------------------------------------
# Override locally to point at your SonarQube instance
sonar.host.url=http://localhost:9000

# Authentication: export SONAR_TOKEN=<your-personal-token> before running sonar-scanner
# Never set sonar.token here — keep credentials out of version control
